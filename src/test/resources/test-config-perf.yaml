extraction:
  fk_depth: 3
  fetch_size: 500
  batch_size: 1000
  chunk_size: 5000
  tables:
    - table: orders
      filter: "created_at >= '2025-01-01'"
    - table: order_items
      filter: "order_id IN (SELECT id FROM test_brume_perf.orders WHERE created_at >= '2025-01-01')"
    - table: audit_logs
      filter:

anonymization:
  linked_columns:
    - semantic_key: user_email
      columns:
        - table: users
          column: email
        - table: audit_logs
          column: user_email

  tables:
    - table: users
      columns:
        - name: id
          strategy: FPE_ID
        - name: email
          strategy: FAKE
          type: EMAIL
        - name: first_name
          strategy: FAKE
          type: FIRST_NAME
        - name: last_name
          strategy: FAKE
          type: LAST_NAME
        - name: phone
          strategy: MASK
          type: PHONE
        - name: iban
          strategy: FAKE
          type: IBAN
        - name: ip_address
          strategy: MASK
          type: IP_ADDRESS
        - name: address_json
          strategy: FAKE
          type: JSONB
          json_paths:
            - path: "$.street"
              type: ADDRESS
              strategy: FAKE
            - path: "$.city"
              type: ADDRESS
              strategy: MASK
            - path: "$.zip"
              type: ADDRESS
              strategy: HASH
        - name: manager_id
          strategy: NULLIFY

    - table: orders
      columns:
        - name: id
          strategy: FPE_ID
        - name: user_id
          strategy: FPE_ID
        - name: shipping_address
          strategy: FAKE
          type: ADDRESS
        - name: total_amount
          strategy: KEEP
        - name: notes
          strategy: NULLIFY

    - table: products
      columns:
        - name: id
          strategy: FPE_ID
        - name: name
          strategy: HASH
        - name: description
          strategy: KEEP
        - name: ip_address
          strategy: MASK
          type: IP_ADDRESS

    - table: order_items
      columns:
        - name: id
          strategy: FPE_ID
        - name: order_id
          strategy: FPE_ID
        - name: product_id
          strategy: FPE_ID
        - name: quantity
          strategy: KEEP

    - table: audit_logs
      columns:
        - name: id
          strategy: FPE_ID
        - name: user_email
          strategy: FAKE
          type: EMAIL
        - name: action
          strategy: HASH
        - name: ip_address
          strategy: MASK
          type: IP_ADDRESS
        - name: payload
          strategy: FAKE
          type: JSONB
          json_paths:
            - path: "$.user.email"
              type: EMAIL
              strategy: FAKE
            - path: "$.user.session.token"
              type: IBAN
              strategy: HASH
            - path: "$.metadata.source"
              type: IP_ADDRESS
              strategy: MASK

